- name: Rhel 8 High Playbook
  hosts: servers
  tasks:
        - name: Gather the package facts
          package_facts:
            manager: auto
          tags:
          - CCE-80896-4
          - CJIS-5.5.6
          - DISA-STIG-RHEL-08-020330
          - NIST-800-171-3.1.1
          - NIST-800-171-3.1.5
          - NIST-800-53-AC-17(a)
          - NIST-800-53-CM-6(a)
          - NIST-800-53-CM-7(a)
          - NIST-800-53-CM-7(b)
          - PCI-DSS-Req-2.2.4
          - PCI-DSSv4-2.2
          - PCI-DSSv4-2.2.6
          - high_severity
          - low_complexity
          - low_disruption
          - no_reboot_needed
          - restrict_strategy
          - sshd_disable_empty_passwords

        - name: Disable SSH Access via Empty Passwords
          block:

          - name: Check for duplicate values
            ansible.builtin.lineinfile:
              path: /etc/ssh/sshd_config
              create: true
              regexp: (?i)(?i)^\s*PermitEmptyPasswords\s+
              state: absent
            check_mode: true
            changed_when: false
            register: dupes

          - name: Deduplicate values from /etc/ssh/sshd_config
            ansible.builtin.lineinfile:
              path: /etc/ssh/sshd_config
              create: true
              regexp: (?i)(?i)^\s*PermitEmptyPasswords\s+
              state: absent
            when: dupes.found is defined and dupes.found > 1

          - name: Insert correct line to /etc/ssh/sshd_config
            ansible.builtin.lineinfile:
              path: /etc/ssh/sshd_config
              create: true
              regexp: (?i)(?i)^\s*PermitEmptyPasswords\s+
              line: PermitEmptyPasswords no
              state: present
              insertbefore: BOF
              validate: /usr/sbin/sshd -t -f %s
          when: '"kernel-core" in ansible_facts.packages'
          tags:
          - CCE-80896-4
          - CJIS-5.5.6
          - DISA-STIG-RHEL-08-020330
          - NIST-800-171-3.1.1
          - NIST-800-171-3.1.5
          - NIST-800-53-AC-17(a)
          - NIST-800-53-CM-6(a)
          - NIST-800-53-CM-7(a)
          - NIST-800-53-CM-7(b)
          - PCI-DSS-Req-2.2.4
          - PCI-DSSv4-2.2
          - PCI-DSSv4-2.2.6
          - high_severity
          - low_complexity
          - low_disruption
          - no_reboot_needed
          - restrict_strategy
          - sshd_disable_empty_passwords

        - name: XCCDF Value var_system_crypto_policy # promote to variable
          set_fact:
            var_system_crypto_policy: !!str FIPS
          tags:
            - always

        - name: Configure System Cryptography Policy - Check current crypto policy (runtime)
          ansible.builtin.command: /usr/bin/update-crypto-policies --show
          register: current_crypto_policy
          changed_when: false
          failed_when: false
          check_mode: false
          tags:
          - CCE-80935-0
          - DISA-STIG-RHEL-08-010020
          - DISA-STIG-needed_rules
          - NIST-800-53-AC-17(2)
          - NIST-800-53-AC-17(a)
          - NIST-800-53-CM-6(a)
          - NIST-800-53-MA-4(6)
          - NIST-800-53-SC-12(2)
          - NIST-800-53-SC-12(3)
          - NIST-800-53-SC-13
          - PCI-DSSv4-2.2
          - PCI-DSSv4-2.2.7
          - configure_crypto_policy
          - high_severity
          - low_complexity
          - low_disruption
          - no_reboot_needed
          - restrict_strategy

        - name: Configure System Cryptography Policy - Get mtime of /etc/crypto-policies/config
          ansible.builtin.stat:
            path: /etc/crypto-policies/config
          register: config_file_stat
          changed_when: false
          failed_when: false
          check_mode: false
          tags:
          - CCE-80935-0
          - DISA-STIG-RHEL-08-010020
          - DISA-STIG-needed_rules
          - NIST-800-53-AC-17(2)
          - NIST-800-53-AC-17(a)
          - NIST-800-53-CM-6(a)
