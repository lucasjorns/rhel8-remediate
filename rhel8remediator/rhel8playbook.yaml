          - NIST-800-53-SA-12(10)
          - ensure_gpgcheck_local_packages
          - high_severity
          - low_complexity
          - medium_disruption
          - no_reboot_needed
          - unknown_strategy

        - name: Ensure GPG check Enabled for Local Packages (yum)
          block:

          - name: Check stats of yum
            ansible.builtin.stat:
              path: /etc/yum.conf
            register: pkg

          - name: Check if config file of yum is a symlink
            ansible.builtin.set_fact:
              pkg_config_file_symlink: '{{ pkg.stat.lnk_target if pkg.stat.lnk_target is match("^/.*")
                else "/etc/yum.conf" | dirname ~ "/" ~ pkg.stat.lnk_target }}'
            when: pkg.stat.lnk_target is defined

          - name: Ensure GPG check Enabled for Local Packages (yum)
            community.general.ini_file:
              dest: '{{ pkg_config_file_symlink |  default("/etc/yum.conf") }}'
              section: main
              option: localpkg_gpgcheck
              value: 1
              no_extra_spaces: true
              create: true
          when: '"yum" in ansible_facts.packages'
          tags:
          - CCE-80791-7
          - DISA-STIG-RHEL-08-010371
          - NIST-800-171-3.4.8
          - NIST-800-53-CM-11(a)
          - NIST-800-53-CM-11(b)
          - NIST-800-53-CM-5(3)
          - NIST-800-53-CM-6(a)
          - NIST-800-53-SA-12
          - NIST-800-53-SA-12(10)
          - ensure_gpgcheck_local_packages
          - high_severity
          - low_complexity
          - medium_disruption
          - no_reboot_needed
          - unknown_strategy

        - name: Gather the package facts
          package_facts:
            manager: auto
          tags:
          - CCE-80823-8
          - DISA-STIG-RHEL-08-010820
          - NIST-800-171-3.1.1
          - NIST-800-53-AC-6(1)
          - NIST-800-53-CM-6(a)
          - NIST-800-53-CM-7(b)
          - PCI-DSSv4-8.3
          - PCI-DSSv4-8.3.1
          - gnome_gdm_disable_automatic_login
          - high_severity
          - low_complexity
          - medium_disruption
          - no_reboot_needed
          - unknown_strategy

        - name: Disable GDM Automatic Login
          community.general.ini_file:
            dest: /etc/gdm/custom.conf
            section: daemon
            option: AutomaticLoginEnable
            value: 'false'
            no_extra_spaces: true
            create: true
          when: '"gdm" in ansible_facts.packages'
          tags:
          - CCE-80823-8
          - DISA-STIG-RHEL-08-010820
          - NIST-800-171-3.1.1
          - NIST-800-53-AC-6(1)
          - NIST-800-53-CM-6(a)
          - NIST-800-53-CM-7(b)
          - PCI-DSSv4-8.3
