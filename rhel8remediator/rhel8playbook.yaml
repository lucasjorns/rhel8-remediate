          - low_disruption
          - no_reboot_needed

        - name: Gather the package facts
          package_facts:
            manager: auto
          tags:
          - CCE-80841-0
          - CJIS-5.5.2
          - DISA-STIG-RHEL-08-020331
          - DISA-STIG-RHEL-08-020332
          - NIST-800-171-3.1.1
          - NIST-800-171-3.1.5
          - NIST-800-53-CM-6(a)
          - NIST-800-53-IA-5(1)(a)
          - NIST-800-53-IA-5(c)
          - PCI-DSS-Req-8.2.3
          - PCI-DSSv4-8.3
          - PCI-DSSv4-8.3.1
          - configure_strategy
          - high_severity
          - low_complexity
          - medium_disruption
          - no_empty_passwords
          - no_reboot_needed

        - name: Prevent Login to Accounts With Empty Password - Check if system relies on
            authselect
          ansible.builtin.stat:
            path: /usr/bin/authselect
          register: result_authselect_present
          when: '"kernel-core" in ansible_facts.packages'
          tags:
          - CCE-80841-0
          - CJIS-5.5.2
          - DISA-STIG-RHEL-08-020331
          - DISA-STIG-RHEL-08-020332
          - NIST-800-171-3.1.1
          - NIST-800-171-3.1.5
          - NIST-800-53-CM-6(a)
          - NIST-800-53-IA-5(1)(a)
          - NIST-800-53-IA-5(c)
          - PCI-DSS-Req-8.2.3
          - PCI-DSSv4-8.3
          - PCI-DSSv4-8.3.1
          - configure_strategy
          - high_severity
          - low_complexity
          - medium_disruption
          - no_empty_passwords
          - no_reboot_needed

        - name: Prevent Login to Accounts With Empty Password - Remediate using authselect
          block:

          - name: Prevent Login to Accounts With Empty Password - Check integrity of authselect
              current profile
            ansible.builtin.command:
              cmd: authselect check
            register: result_authselect_check_cmd
            changed_when: false
            check_mode: false
            failed_when: false

          - name: Prevent Login to Accounts With Empty Password - Informative message based
              on the authselect integrity check result
            ansible.builtin.assert:
              that:
              - ansible_check_mode or result_authselect_check_cmd.rc == 0
              fail_msg:
              - authselect integrity check failed. Remediation aborted!
              - This remediation could not be applied because an authselect profile was not
                selected or the selected profile is not intact.
              - It is not recommended to manually edit the PAM files when authselect tool
                is available.
              - In cases where the default authselect profile does not cover a specific demand,
                a custom authselect profile is recommended.
              success_msg:
              - authselect integrity check passed

          - name: Prevent Login to Accounts With Empty Password - Get authselect current features
            ansible.builtin.shell:
              cmd: authselect current | tail -n+3 | awk '{ print $2 }'
            register: result_authselect_features
            changed_when: false
            check_mode: false
            when:
            - result_authselect_check_cmd is success

          - name: Prevent Login to Accounts With Empty Password - Ensure "without-nullok"
              feature is enabled using authselect tool
            ansible.builtin.command:
              cmd: authselect enable-feature without-nullok
            register: result_authselect_enable_feature_cmd
            when:
            - result_authselect_check_cmd is success
            - result_authselect_features.stdout is not search("without-nullok")

          - name: Prevent Login to Accounts With Empty Password - Ensure authselect changes
              are applied
            ansible.builtin.command:
              cmd: authselect apply-changes -b
            when:
            - result_authselect_enable_feature_cmd is not skipped
            - result_authselect_enable_feature_cmd is success
          when:
          - '"kernel-core" in ansible_facts.packages'
          - result_authselect_present.stat.exists
          tags:
          - CCE-80841-0
          - CJIS-5.5.2
          - DISA-STIG-RHEL-08-020331
          - DISA-STIG-RHEL-08-020332
          - NIST-800-171-3.1.1
          - NIST-800-171-3.1.5
          - NIST-800-53-CM-6(a)
          - NIST-800-53-IA-5(1)(a)
          - NIST-800-53-IA-5(c)
          - PCI-DSS-Req-8.2.3
          - PCI-DSSv4-8.3
          - PCI-DSSv4-8.3.1
          - configure_strategy
          - high_severity
          - low_complexity
          - medium_disruption
          - no_empty_passwords
          - no_reboot_needed

        - name: Prevent Login to Accounts With Empty Password - Remediate directly editing
            PAM files
          ansible.builtin.replace:
            dest: '{{ item }}'
            regexp: nullok
          loop:
          - /etc/pam.d/system-auth
          - /etc/pam.d/password-auth
          when:
          - '"kernel-core" in ansible_facts.packages'
          - not result_authselect_present.stat.exists
          tags:
          - CCE-80841-0
          - CJIS-5.5.2
          - DISA-STIG-RHEL-08-020331
          - DISA-STIG-RHEL-08-020332
          - NIST-800-171-3.1.1
          - NIST-800-171-3.1.5
          - NIST-800-53-CM-6(a)
          - NIST-800-53-IA-5(1)(a)
          - NIST-800-53-IA-5(c)
          - PCI-DSS-Req-8.2.3
          - PCI-DSSv4-8.3
          - PCI-DSSv4-8.3.1
          - configure_strategy
          - high_severity
          - low_complexity
          - medium_disruption
          - no_empty_passwords
          - no_reboot_needed

        - name: Change grubv2 superuser to something uncommon.
          ansible.builtin.shell: >
                  sed -i 's/\(set superusers=\).*/\1"master"/g' /etc/grub.d/01_users
          args:
                  executable: /bin/bash

        - name: Ensure "export superusers" is present in /etc/grub.d/01_users
          ansible.builtin.lineinfile:
                  path: /etc/grub.d/01_users
                  line: "export superusers"
                  state: present

        - name: regenerate grub
          ansible.builtin.command: >
                  grub2-mkconfig -o /boot/grub2/grub.cfg
          register: grub_mkconfig
          changed_when: "'Generating grub configuration file' in grub_mkconfig.stdout"

        - name: Change grubv2 password
          ansible.builtin.shell: |
                  printf '%s\n%s\n' "{{grubpass}}" "{{grubpass}}" | \
                  script -q -c "grub2-setpassword" /dev/null

          args:
                  executable: /bin/bash
                  creates: /boot/grub2/user.cfg

        - name: enable FIPS mode
          ansible.builtin.shell: >
                  fips-mode-setup --enable
          args:
                  executable: /bin/bash

