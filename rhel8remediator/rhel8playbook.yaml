          - NIST-800-53-AC-17(a)
          - NIST-800-53-CM-6(a)
          - NIST-800-53-MA-4(6)
          - NIST-800-53-SC-12(2)
          - NIST-800-53-SC-12(3)
          - NIST-800-53-SC-13
          - PCI-DSSv4-2.2
          - PCI-DSSv4-2.2.7
          - configure_crypto_policy
          - high_severity
          - low_complexity
          - low_disruption
          - no_reboot_needed
          - restrict_strategy

        - name: XCCDF Value sshd_approved_ciphers # promote to variable
          set_fact:
            sshd_approved_ciphers: !!str aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes128-ctr
          tags:
            - always

        - name: 'Configure SSH Daemon to Use FIPS 140-2 Validated Ciphers: openssh.config'
          block:

          - name: Check for duplicate values
            ansible.builtin.lineinfile:
              path: /etc/crypto-policies/back-ends/openssh.config
              create: true
              regexp: (?i)^.*Ciphers\s+
              state: absent
            check_mode: true
            changed_when: false
            register: dupes

          - name: Deduplicate values from /etc/crypto-policies/back-ends/openssh.config
            ansible.builtin.lineinfile:
              path: /etc/crypto-policies/back-ends/openssh.config
              create: true
              regexp: (?i)^.*Ciphers\s+
              state: absent
            when: dupes.found is defined and dupes.found > 1

          - name: Insert correct line to /etc/crypto-policies/back-ends/openssh.config
            ansible.builtin.lineinfile:
              path: /etc/crypto-policies/back-ends/openssh.config
              create: true
              regexp: (?i)^.*Ciphers\s+
              line: Ciphers {{ sshd_approved_ciphers }}
              state: present
          tags:
          - CCE-85902-5
          - DISA-STIG-RHEL-08-010020
          - DISA-STIG-RHEL-08-010296
          - NIST-800-53-AC-17(2)
          - harden_sshd_ciphers_openssh_conf_crypto_policy
          - high_severity
          - low_complexity
          - low_disruption
          - reboot_required
          - restrict_strategy

        - name: Gather the package facts
          package_facts:
            manager: auto
          tags:
