        - name: Gather the package facts
          package_facts:
            manager: auto
          tags:
          - CCE-80785-9
          - DISA-STIG-RHEL-08-040170
          - NIST-800-171-3.4.5
          - NIST-800-53-AC-6(1)
          - NIST-800-53-CM-6(a)
          - disable_ctrlaltdel_reboot
          - disable_strategy
          - high_severity
          - low_complexity
          - low_disruption
