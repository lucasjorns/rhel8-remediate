          - NIST-800-53-SC-12(2)
          - NIST-800-53-SC-12(3)
          - NIST-800-53-SC-13
          - PCI-DSSv4-2.2
          - PCI-DSSv4-2.2.7
          - configure_crypto_policy
          - high_severity
          - low_complexity
          - low_disruption
          - no_reboot_needed
          - restrict_strategy

        - name: Configure System Cryptography Policy - Get mtime of /etc/crypto-policies/state/current
          ansible.builtin.stat:
            path: /etc/crypto-policies/state/current
          register: current_file_stat
          changed_when: false
          failed_when: false
          check_mode: false
          tags:
          - CCE-80935-0
          - DISA-STIG-RHEL-08-010020
          - DISA-STIG-needed_rules
          - NIST-800-53-AC-17(2)
          - NIST-800-53-AC-17(a)
          - NIST-800-53-CM-6(a)
          - NIST-800-53-MA-4(6)
