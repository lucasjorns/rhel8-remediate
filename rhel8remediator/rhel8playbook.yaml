          - DISA-STIG-RHEL-08-040172
          - NIST-800-171-3.4.5
          - NIST-800-53-AC-6(1)
          - NIST-800-53-CM-6(a)
          - NIST-800-53-CM-6(a)
          - disable_ctrlaltdel_burstaction
          - disable_strategy
          - high_severity
