        - name: Disable Ctrl-Alt-Del Reboot Key Sequence in GNOME3
          community.general.ini_file:
            dest: /etc/dconf/db/local.d/00-security-settings
            section: org/gnome/settings-daemon/plugins/media-keys
            option: logout
            value: '['''']'
            create: true
            no_extra_spaces: true
          register: result_ini
          when: '"gdm" in ansible_facts.packages'
          tags:
          - CCE-84028-0
          - DISA-STIG-RHEL-08-040171
          - NIST-800-171-3.1.2
          - NIST-800-53-AC-6(1)
          - NIST-800-53-CM-6(a)
          - NIST-800-53-CM-7(b)
          - dconf_gnome_disable_ctrlaltdel_reboot
          - high_severity
          - low_complexity
          - medium_disruption
          - no_reboot_needed
          - unknown_strategy

        - name: Prevent user modification of GNOME disablement of Ctrl-Alt-Del
          ansible.builtin.lineinfile:
            path: /etc/dconf/db/local.d/locks/00-security-settings-lock
            regexp: ^/org/gnome/settings-daemon/plugins/media-keys/logout$
            line: /org/gnome/settings-daemon/plugins/media-keys/logout
            create: true
          register: result_lineinfile
          when: '"gdm" in ansible_facts.packages'
          tags:
          - CCE-84028-0
          - DISA-STIG-RHEL-08-040171
          - NIST-800-171-3.1.2
          - NIST-800-53-AC-6(1)
          - NIST-800-53-CM-6(a)
          - NIST-800-53-CM-7(b)
          - dconf_gnome_disable_ctrlaltdel_reboot
          - high_severity
          - low_complexity
          - medium_disruption
          - no_reboot_needed
          - unknown_strategy

        - name: Dconf Update
          ansible.builtin.command: dconf update
          when:
          - '"gdm" in ansible_facts.packages'
